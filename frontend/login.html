<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Anderson Clinical Genetics</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: #d0def9;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.05);
      padding: 40px 36px;
      width: 100%;
      max-width: 480px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 18px;
    }
    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: #9CA3AF;
    }
    input[type="password"], input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #111827;
      background: #F9FAFB;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
      background: #fff;
    }

    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }
    .checkbox-wrap {
      display: flex; align-items: center; gap: 7px;
      font-size: 12.5px; color: #6B7280; font-weight: 500;
    }
    .checkbox-wrap input { width: 14px; height: 14px; }

    button.submit {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: #4F46E5;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button.submit:hover { background: #4338CA; }

    .error-msg {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      color: #B91C1C;
      font-size: 12.5px;
      font-weight: 500;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 18px;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }
</style>
</head>
<body>

  <div class="login-card">
    <div class="brand">
      <div class="brand-name">Anderson Clinical Genetics</div>
    </div>

    <h1>Sign in</h1>

    <div class="error-msg" id="errorMsg">
      <i class="fas fa-circle-exclamation"></i>
      <span id="errorText">Invalid mobile number or password.</span>
    </div>

    <form id="loginForm">
      <label for="mobile_number">Mobile Number</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="tel" id="mobile_number" name="mobile_number" placeholder="Enter your mobile number"
               inputmode="numeric" pattern="[0-9]{10}" maxlength="10" autocomplete="tel" required />
      </div>

      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>

      <div class="row-between">
        <label class="checkbox-wrap">
          <input type="checkbox" id="rememberMe" />
          Remember me
        </label>
      </div>

      <button type="submit" class="submit" id="submitBtn">
        <i class="fas fa-arrow-right-to-bracket"></i>
        Sign In
      </button>
    </form>
  </div>

  <script>
    
    
    
    const form     = document.getElementById('loginForm');
    const errorBox = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const mobileNumberInput = document.getElementById('mobile_number');

    mobileNumberInput.addEventListener('input', () => {
      mobileNumberInput.value = mobileNumberInput.value.replace(/[^0-9]/g, '').slice(0, 10);
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');

      const mobileNumber = mobileNumberInput.value.trim();
      const password = document.getElementById('password').value;
      if (!/^[0-9]{10}$/.test(mobileNumber)) {
        showError('Please enter a valid 10-digit mobile number.');
        return;
      }
      if (!password) {
        showError('Invalid mobile number or password.');
        return;
      }

      submitBtn.disabled = true;

      try {
        const res = await fetch('/access/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mobile: mobileNumber, password }),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.detail || 'Invalid mobile number or password.');
          return;
        }

        if (data.otp_required === false) {
          localStorage.setItem('arc_authenticated', 'true');
          localStorage.setItem('arc_access_control', String(data.access_control !== false));
          localStorage.setItem('arc_mobile_number', data.mobile_number || mobileNumber);
          localStorage.setItem('arc_name', data.name || '');
          localStorage.setItem('arc_role', data.role || 'user');
          localStorage.setItem('arc_report', data.report || '');
          window.location.href = '/index.html';
          return;
        }

        sessionStorage.setItem('arc_otp_pending', 'true');
        sessionStorage.setItem('arc_pending_mobile', data.mobile);
        sessionStorage.setItem('arc_pending_hash', data.hash);
        sessionStorage.setItem('arc_pending_password', password);
        window.location.href = '/otp.html';
      } catch (err) {
        showError('Could not reach the server. Please try again.');
      } finally {
        submitBtn.disabled = false;
      }
    });
</script>
</body>
</html>
